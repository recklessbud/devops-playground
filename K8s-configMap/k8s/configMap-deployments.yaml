apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-deployment  
  labels:
    app: configmap-depl

spec:
  replicas: 2
  selector:
    matchLabels:
      app: configmap-depl
  template:
    metadata:
      labels:
        app: configmap-depl
    spec:
      restartPolicy: Always
      containers:
      - name: configmap-depl
        image: bureck/k8s-single-pod:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 60004
        envFrom:
        - configMapRef:
            name: configmap